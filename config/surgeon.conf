[default]
# 默认日志格式 (auto, syslog, json, nginx, apache, glibc, custom)
format = auto

# 时间格式
time_format = %Y-%m-%d %H:%M:%S

# 连接/读取超时（秒）
timeout = 5

# 启用彩色输出
color = true

[parser]
# 自定义正则模式（用于 custom 格式）
# pattern = ^(?P<timestamp>\S+)\s+(?P<level>\w+)\s+(?P<message>.*)$

[output]
# 默认导出格式 (text, json, csv)
export_format = text

# 日志行数限制（0 = 无限制）
limit = 1000

# 时间戳格式
timestamp_format = %Y-%m-%d %H:%M:%S

[stats]
# 默认 Top N 数量
top_n = 10

# 时间分桶 (minute, hour, day)
time_bucket = hour
