# log-surgeon 模式配置文件
# 用于高级过滤与异常检测
# 每行一个模式定义: type:pattern
#
# type 可选值:
#   error_pattern   - 错误检测正则
#   path_pattern    - 可疑路径正则
#   ip_whitelist    - IP 白名单 (忽略统计)
#   log_format      - 指定格式 (apache|nginx|syslog|json|plain)

# ----- 错误级别 -----
error_pattern:.*\b(error|ERROR|FATAL|fatal|exception|Exception)\b.*

# ----- 可疑路径检测 -----
path_pattern:.*\/\.\..*
path_pattern:.*\/\.env.*
path_pattern:.*\/\.git.*
path_pattern:.*\/phpmyadmin.*
path_pattern:.*\/admin\/login.*
path_pattern:.*\/wp-admin.*
path_pattern:.*\/wp-login\.php.*
path_pattern:.*\/config\.php.*
path_pattern:.*\/shell\.php.*
path_pattern:.*\/cmd\.asp.*

# ----- 高频扫描检测 -----
path_pattern:.*\/xmlrpc\.php.*
path_pattern:.*\/wp-includes.*
path_pattern:.*\/readme\.html.*
path_pattern:.*\/robots\.txt.*

# ----- IP 白名单 (内网) -----
ip_whitelist:^127\..*
ip_whitelist:^10\..*
ip_whitelist:^172\.(1[6-9]|2[0-9]|3[0-1])\..*
ip_whitelist:^192\.168\..*
ip_whitelist:^::1$
ip_whitelist:^fe80:.*

# ----- 日志格式 (覆盖自动检测) -----
# log_format:apache
# log_format:syslog
# log_format:json
